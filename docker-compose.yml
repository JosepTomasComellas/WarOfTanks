version: '3.8'

# ─────────────────────────────────────────────
#  War of Tanks — CLIENT (alumnes)
#
#  1. Crea un fitxer .env amb: SERVER_IP=x.x.x.x
#  2. docker compose up -d
#  3. Obre http://localhost:8080
# ─────────────────────────────────────────────

services:
  war-of-tanks:
    image: ghcr.io/joseptomascomellas/warofttanks:latest
    container_name: wot-client
    environment:
      - ROLE=client
      - SERVER_IP=${SERVER_IP}
      - UDP_PORT=8888
      - HTTP_PORT=8080
    ports:
      - "8080:8080"
    restart: unless-stopped

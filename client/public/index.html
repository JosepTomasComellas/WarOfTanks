<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>War of Tanks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>/* __SERVER_CONFIG__ */</script>
</head>
<body>

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="site-header">
    <img src="images/logo.png" alt="Salesians Logo" class="header-logo">
    <div class="header-title">
      <span class="header-main">War of Tanks</span>
      <span class="header-sub">Competició de batalles en xarxa</span>
    </div>
  </header>

  <!-- ══════════════ MAIN CONTENT ══════════════ -->
  <main class="site-main">

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="screen active">
      <div class="arcade-frame">
        <div class="arcade-title">
          <div class="title-line1">★ WAR OF TANKS ★</div>
          <div class="title-line2">BATTLE ARENA</div>
          <div class="blink-text">─── INSERT COIN ───</div>
        </div>

        <div class="login-form">
          <label for="player-name">NOM DEL JUGADOR</label>
          <input type="text" id="player-name" maxlength="16"
                 placeholder="ENTRA EL TEU NOM" autocomplete="off" spellcheck="false">
          <button id="btn-start">▶ PLAYER START ◀</button>
        </div>

        <div class="controls-info">
          <div class="ctrl-row"><span class="key">W A S D</span> o <span class="key">↑ ← ↓ →</span> Moure</div>
          <div class="ctrl-row"><span class="key">ESPAI</span> Disparar</div>
        </div>
      </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-game" class="screen">
      <div class="game-ui-overlay">
        <button id="btn-leave" class="btn-leave">✕ SORTIR</button>
      </div>
      <canvas id="game-canvas"></canvas>
    </div>

    <!-- DISCONNECTED SCREEN -->
    <div id="screen-disconnected" class="screen">
      <div class="arcade-frame">
        <div class="arcade-title">
          <div class="title-line1">GAME OVER</div>
          <div class="blink-text">CONNEXIÓ PERDUDA</div>
        </div>
        <button onclick="location.reload()">▶ TORNA A INTENTAR-HO ◀</button>
      </div>
    </div>

  </main>

  <!-- ══════════════ FOOTER ══════════════ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <img src="images/logo.png" alt="Salesians" class="footer-logo">
      <div class="footer-text">
        <span>© <span id="footer-year"></span> Salesians · Pràctica de xarxes</span>
        <span class="footer-sep">|</span>
        <span>Desenvolupat amb Node.js + UDP/WebSocket</span>
      </div>
    </div>
  </footer>

  <script src="js/protocol.js"></script>
  <script src="js/input.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/game.js"></script>
  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    let _game = null;

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      const el = document.getElementById('screen-' + name);
      if (el) el.classList.add('active');
    }

    document.getElementById('btn-start').addEventListener('click', () => {
      const name = document.getElementById('player-name').value.trim();
      if (!name) { document.getElementById('player-name').focus(); return; }
      _game = new Game(document.getElementById('game-canvas'));
      _game.start(name);
    });

    document.getElementById('player-name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-start').click();
    });

    document.getElementById('btn-leave').addEventListener('click', () => {
      if (_game) { _game.leave(); _game = null; }
      showScreen('login');
    });

    // Apply server config (logo URL, etc.)
    fetch('/api/config').then(r => r.json()).then(cfg => {
      if (cfg.logoUrl) {
        document.querySelectorAll('.header-logo, .footer-logo').forEach(img => {
          img.src = cfg.logoUrl;
        });
      }
    }).catch(() => {});
  </script>
</body>
</html>

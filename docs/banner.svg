<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 260" width="860" height="260">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#020802"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M12 0H0V12" fill="none" stroke="#0d2b0d" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="860" height="260" fill="url(#bgGrad)"/>
  <rect width="860" height="260" fill="url(#grid)" opacity="0.5"/>

  <!-- Vignette -->
  <radialGradient id="vign" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="860" height="260" fill="url(#vign)"/>

  <!-- ── WALL TILES (brown blocks) ── -->
  <!-- Left cluster -->
  <rect x="30"  y="40"  width="20" height="20" fill="#5a3a12" rx="1"/>
  <rect x="50"  y="40"  width="20" height="20" fill="#6b4418" rx="1"/>
  <rect x="30"  y="60"  width="20" height="20" fill="#6b4418" rx="1"/>
  <rect x="50"  y="60"  width="20" height="20" fill="#5a3a12" rx="1"/>
  <rect x="30"  y="80"  width="20" height="20" fill="#5a3a12" rx="1"/>
  <rect x="50"  y="80"  width="20" height="20" fill="#6b4418" rx="1"/>
  <!-- cracked wall (destroyed) -->
  <rect x="30"  y="100" width="20" height="20" fill="#2a1808" rx="1" opacity="0.5"/>
  <line x1="33" y1="102" x2="42" y2="118" stroke="#1a0e04" stroke-width="1.5"/>
  <line x1="42" y1="106" x2="48" y2="118" stroke="#1a0e04" stroke-width="1"/>

  <!-- Right cluster -->
  <rect x="790" y="60"  width="20" height="20" fill="#5a3a12" rx="1"/>
  <rect x="810" y="60"  width="20" height="20" fill="#6b4418" rx="1"/>
  <rect x="790" y="80"  width="20" height="20" fill="#6b4418" rx="1"/>
  <rect x="810" y="80"  width="20" height="20" fill="#5a3a12" rx="1"/>
  <rect x="790" y="100" width="20" height="20" fill="#5a3a12" rx="1"/>

  <!-- Top-right small cluster -->
  <rect x="720" y="30"  width="20" height="20" fill="#5a3a12" rx="1"/>
  <rect x="740" y="30"  width="20" height="20" fill="#6b4418" rx="1"/>
  <rect x="720" y="50"  width="20" height="20" fill="#6b4418" rx="1"/>

  <!-- Bottom-left small cluster -->
  <rect x="100" y="190" width="20" height="20" fill="#5a3a12" rx="1"/>
  <rect x="120" y="190" width="20" height="20" fill="#6b4418" rx="1"/>
  <rect x="100" y="210" width="20" height="20" fill="#6b4418" rx="1"/>

  <!-- ── TANK 1 (green, top-left, facing right) ── -->
  <g transform="translate(82,145)" filter="url(#glow)">
    <!-- body -->
    <rect x="-14" y="-10" width="28" height="20" fill="#00cc33" rx="2"/>
    <!-- turret -->
    <rect x="-7"  y="-7"  width="14" height="14" fill="#00ff41" rx="1"/>
    <!-- barrel (facing right) -->
    <rect x="7"   y="-2"  width="16" height="4"  fill="#00cc33"/>
    <!-- wheels -->
    <rect x="-14" y="8"   width="6"  height="4"  fill="#009922" rx="1"/>
    <rect x="-5"  y="8"   width="6"  height="4"  fill="#009922" rx="1"/>
    <rect x="4"   y="8"   width="6"  height="4"  fill="#009922" rx="1"/>
  </g>

  <!-- ── TANK 2 (red, top-right, facing left) ── -->
  <g transform="translate(758,145)" filter="url(#glow)">
    <rect x="-14" y="-10" width="28" height="20" fill="#cc2222" rx="2"/>
    <rect x="-7"  y="-7"  width="14" height="14" fill="#ff4444" rx="1"/>
    <!-- barrel (facing left) -->
    <rect x="-23" y="-2"  width="16" height="4"  fill="#cc2222"/>
    <rect x="-14" y="8"   width="6"  height="4"  fill="#991111" rx="1"/>
    <rect x="-5"  y="8"   width="6"  height="4"  fill="#991111" rx="1"/>
    <rect x="4"   y="8"   width="6"  height="4"  fill="#991111" rx="1"/>
  </g>

  <!-- ── TANK 3 (blue, bottom-left, facing up-right) ── -->
  <g transform="translate(140,200) rotate(-45)" filter="url(#glow)">
    <rect x="-14" y="-10" width="28" height="20" fill="#2255cc" rx="2"/>
    <rect x="-7"  y="-7"  width="14" height="14" fill="#4488ff" rx="1"/>
    <rect x="7"   y="-2"  width="16" height="4"  fill="#2255cc"/>
    <rect x="-14" y="8"   width="6"  height="4"  fill="#1a3a99" rx="1"/>
    <rect x="-5"  y="8"   width="6"  height="4"  fill="#1a3a99" rx="1"/>
    <rect x="4"   y="8"   width="6"  height="4"  fill="#1a3a99" rx="1"/>
  </g>

  <!-- ── TANK 4 (yellow, bottom-right, facing left) ── -->
  <g transform="translate(720,200) rotate(180)" filter="url(#glow)">
    <rect x="-14" y="-10" width="28" height="20" fill="#cc9900" rx="2"/>
    <rect x="-7"  y="-7"  width="14" height="14" fill="#ffdd00" rx="1"/>
    <rect x="7"   y="-2"  width="16" height="4"  fill="#cc9900"/>
    <rect x="-14" y="8"   width="6"  height="4"  fill="#996600" rx="1"/>
    <rect x="-5"  y="8"   width="6"  height="4"  fill="#996600" rx="1"/>
    <rect x="4"   y="8"   width="6"  height="4"  fill="#996600" rx="1"/>
  </g>

  <!-- ── BULLETS ── -->
  <rect x="104" y="143" width="5" height="5" fill="#ffee00" filter="url(#glow)"/>
  <rect x="118" y="143" width="5" height="5" fill="#ffee00" opacity="0.6"/>
  <rect x="132" y="143" width="5" height="5" fill="#ffee00" opacity="0.3"/>

  <rect x="735" y="143" width="5" height="5" fill="#ffee00" filter="url(#glow)"/>
  <rect x="721" y="143" width="5" height="5" fill="#ffee00" opacity="0.6"/>

  <!-- ── EXPLOSION (centre-right) ── -->
  <g transform="translate(680,170)" filter="url(#glowStrong)">
    <circle cx="0" cy="0" r="18" fill="#ff6600" opacity="0.25"/>
    <circle cx="0" cy="0" r="10" fill="#ff8800" opacity="0.5"/>
    <!-- spark rays -->
    <line x1="0" y1="-22" x2="0"   y2="-12" stroke="#ffcc00" stroke-width="2.5"/>
    <line x1="16" y1="-16" x2="9"  y2="-9"  stroke="#ffcc00" stroke-width="2"/>
    <line x1="22" y1="0"  x2="12"  y2="0"   stroke="#ffcc00" stroke-width="2.5"/>
    <line x1="16" y1="16" x2="9"   y2="9"   stroke="#ffaa00" stroke-width="2"/>
    <line x1="0"  y1="22" x2="0"   y2="12"  stroke="#ffcc00" stroke-width="2.5"/>
    <line x1="-16" y1="16" x2="-9" y2="9"   stroke="#ffaa00" stroke-width="2"/>
    <line x1="-22" y1="0" x2="-12" y2="0"   stroke="#ffcc00" stroke-width="2.5"/>
    <line x1="-16" y1="-16" x2="-9" y2="-9" stroke="#ffaa00" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- ── TITLE ── -->
  <text x="430" y="105"
        font-family="'Courier New', Courier, monospace"
        font-size="58"
        font-weight="bold"
        letter-spacing="8"
        text-anchor="middle"
        fill="#00ff41"
        filter="url(#glowStrong)">WAR OF TANKS</text>

  <!-- Title shadow/depth -->
  <text x="433" y="108"
        font-family="'Courier New', Courier, monospace"
        font-size="58"
        font-weight="bold"
        letter-spacing="8"
        text-anchor="middle"
        fill="#004d14"
        opacity="0.6">WAR OF TANKS</text>

  <text x="430" y="105"
        font-family="'Courier New', Courier, monospace"
        font-size="58"
        font-weight="bold"
        letter-spacing="8"
        text-anchor="middle"
        fill="#00ff41"
        filter="url(#glow)">WAR OF TANKS</text>

  <!-- ── SUBTITLE ── -->
  <text x="430" y="140"
        font-family="'Courier New', Courier, monospace"
        font-size="14"
        letter-spacing="5"
        text-anchor="middle"
        fill="#00aa30">MULTIPLAYER CLASSROOM BATTLE · UP TO 120 PLAYERS</text>

  <!-- ── BOTTOM BAR ── -->
  <line x1="160" y1="220" x2="700" y2="220" stroke="#005518" stroke-width="1"/>

  <text x="430" y="240"
        font-family="'Courier New', Courier, monospace"
        font-size="11"
        letter-spacing="3"
        text-anchor="middle"
        fill="#005518">NODE.JS · UDP · WEBSOCKET · DOCKER · HTML5 CANVAS</text>

  <!-- Corner brackets -->
  <path d="M10,10 L10,30 M10,10 L30,10"   stroke="#005518" stroke-width="1.5" fill="none"/>
  <path d="M850,10 L850,30 M850,10 L830,10" stroke="#005518" stroke-width="1.5" fill="none"/>
  <path d="M10,250 L10,230 M10,250 L30,250" stroke="#005518" stroke-width="1.5" fill="none"/>
  <path d="M850,250 L850,230 M850,250 L830,250" stroke="#005518" stroke-width="1.5" fill="none"/>
</svg>

# ─────────────────────────────────────────────────────────────
#  War of Tanks — SERVIDOR (professor)
#
#  Arrancada HTTP (per defecte):
#    docker compose -f docker-compose.server.yml up --build -d
#
#  Arrancada HTTPS:
#    1. Crea un .env amb: CERTS_PATH=/ruta/als/teus/certs
#    2. Descomenta les línies marcades amb [HTTPS]
#    3. docker compose -f docker-compose.server.yml up --build -d
# ─────────────────────────────────────────────────────────────

services:
  war-of-tanks:
    build: .
    image: ghcr.io/joseptomascomellas/warofttanks:latest
    container_name: wot-server
    environment:
      - ROLE=server
      - UDP_PORT=8888
      - HTTP_PORT=8888
      # [HTTPS] Descomenta les 3 línies següents per activar HTTPS:
      # - HTTPS_ENABLED=true
      # - SSL_CERT=/certs/cert.pem
      # - SSL_KEY=/certs/key.pem
    ports:
      - "8888:8888/udp"   # protocol de joc (UDP)
      - "8888:8888"        # interfície web + panell admin (TCP)
    # [HTTPS] Descomenta el volum i ajusta CERTS_PATH al .env:
    # volumes:
    #   - ${CERTS_PATH}:/certs:ro
    restart: unless-stopped

version: '3.8'

# ─────────────────────────────────────────────
#  War of Tanks — SERVIDOR (professor)
#
#  docker compose -f docker-compose.server.yml up --build -d
# ─────────────────────────────────────────────

services:
  war-of-tanks:
    build: .
    image: ghcr.io/joseptomascomellas/warofttanks:latest
    container_name: wot-server
    environment:
      - ROLE=server
      - UDP_PORT=8888
      - HTTP_PORT=8888
    ports:
      - "8888:8888/udp"   # protocol de joc (UDP)
      - "8888:8888"        # interfície web + panell admin (TCP)
    restart: unless-stopped
